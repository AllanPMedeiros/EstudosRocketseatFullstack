  <body>
    <h1>Representação de código de computador</h1>

    <!-- Representação de trecho de código de computador usando a tag <code> e <pre>
      para representar um trecho de código de computador, podemos usar a tag <code> para destacar o código em linha e a tag <pre> para preservar a formatação do código em blocos. A tag <code> é usada para destacar palavras ou frases específicas dentro de um parágrafo, enquanto a tag <pre> é usada para exibir blocos de código com formatação preservada, como quebras de linha e espaços em branco. Por exemplo, para representar um trecho de código em linha, podemos usar a tag <code> assim: <code>print("Hello, World!")</code>. Para representar um bloco de código, podemos usar a tag <pre> assim:
<pre>
def greet():
    print("Hello, World!")
</pre>
    -->

    texto
    <code>texto qualquer</code>

    <pre>
    def greet():
    print("Hello, World!")  
    </pre>

    <pre>
        <code>
          Isto é uma tag chamada 
          &lt;code&gt; dentro de uma tag chamada &lt;pre&gt;.
          
          O código dentro da tag
           &lt;code&gt; é exibido como texto simples, 
        </code>
    </pre>
  </body>
