<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Links em html</h1>

    <!-- Sobre links em html
     O link é criado usando a tag <a> (âncora) e o atributo href para especificar o destino do link. O texto entre as tags <a> e </a> é o texto clicável que os usuários verão. 
        Exemplo de link:
        <a href="https://www.example.com">Visite o Example</a>
     Neste exemplo, "Visite o Example" é o texto do link, e quando os usuários clicarem nele, serão redirecionados para "https://www.example.com". Você pode usar links para direcionar os usuários para outras páginas da web, arquivos, endereços de e-mail ou até mesmo para seções específicas dentro da mesma página usando âncoras.
        Exemplo de link para um arquivo:
            <a href="documento.pdf">Baixar Documento</a>
        Exemplo de link para um endereço de e-mail:
            <a href="mailto:
    -->
    
    <a href="https://www.youtube.com">Visite nosso canal no youtube</a>

    <!-- O exemplo abaixo conta com o atributo target que vai direcionar a pessoa ao link indiicado abrindo em uma nova aba mas mantendo o site de origem aberto em outra aba -->
    <a href="https://www.youtube.com" target="_blank">Visite o nosso canal no youtube</a>
 
</body>
</html>
