<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas html</title>
</head>
<body>
     <!-- Sobre listas no html
       Listas são usadas para organizar informações de forma estruturada. Existem três tipos principais de listas em HTML: listas ordenadas, listas não ordenadas e listas de definição.
         1. Listas ordenadas (Ordered Lists): São usadas quando a ordem dos itens é importante. Os itens são numerados automaticamente pelo navegador. Para criar uma lista ordenada, usamos a tag <ol> e cada item da lista é definido com a tag <li>.

        2. Listas não ordenadas (Unordered Lists): São usadas quando a ordem dos itens não é importante. Os itens são marcados com um símbolo (geralmente um círculo ou um quadrado) em vez de números. Para criar uma lista não ordenada, usamos a tag <ul> e cada item da lista é definido com a tag <li>.

        3. Listas de definição (Definition Lists): São usadas para definir termos e suas descrições. Cada termo é definido com a tag <dt> e sua descrição é definida com a tag <dd>. Para criar uma lista de definição, usamos a tag <dl>.
     -->

    <h1>Listas no html</h1>


    <h2>Lista ordenada</h2>
    <ol>
        <li>Primeiro item</li>
        <li>Segundo item</li>
        <li>Terceiro item</li>
    </ol>

    <h2>Lista não ordenada</h2>
    <ul>
        <li>Primeiro item</li>
        <li>Segundo item</li>
        <li>Terceiro item</li>
    </ul>

</body>
</html>
