<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatação Básica de texto html</title>
</head>
<body>
      <!-- Formatação básica de texto no html
        <strong> para deixar o texto em negrito e dar importância a ele</strong>
        <em> para deixar o texto em itálico e dar ênfase a ele</em>
        <mark> para destacar o texto com uma cor de fundo</mark>
        <s> para riscar o texto, indicando que ele foi removido ou não é mais relevante</s> 
      -->

    <h1>Formatação básica de texto no html</h1>

    <p><strong>Lorem ipsum dolor sit amet</strong> consectetur adipisicing elit.<em>A voluptate pariatur quia</em> <mark>itaque qui necessitatibus nam, id commodi</mark> praesentium sunt minima? <s>Architecto culpa nihil quasi quis ducimus iste maxime labore!</s></p>
</body>
</html>
