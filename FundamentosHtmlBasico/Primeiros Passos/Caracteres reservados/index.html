<!--- Caracteres Reservados no HTML --->

<!--

Há certos caracteres que têm um significado especial no HTML e não podem ser usados diretamente no conteúdo da página sem serem "escapados". Esses caracteres são conhecidos como "caracteres reservados". Os principais caracteres reservados no HTML são:
1. < (menor que)
2. > (maior que)
3. & (e comercial)
4. " (aspas duplas)
5. ' (aspas simples)
Para usar esses caracteres em seu conteúdo HTML, você deve substituí-los por suas respectivas entidades HTML:
- < deve ser substituído por &lt;
- > deve ser substituído por &gt;
- & deve ser substituído por &amp;
- " deve ser substituído por &quot;
- ' deve ser substituído por &#39;
 -->

<p>
  <code>
    Exemplo de uso de &#39;caracteres reservados&#39;:
    <br>
    &lt;div&gt;Este é um exemplo de
    &quot;caracteres reservados&quot; no HTML &amp; como usá-los
    corretamente.&lt;/div&gt;
  </code>
</p>
