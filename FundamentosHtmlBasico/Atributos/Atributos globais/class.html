<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <style>
    .produto{
        font-size: 30px;
    }
    .viola{
        font-family:Arial, Helvetica, sans-serif;
        font-style:italic;
    }
    .violino{
        font-family: 'Times New Roman', Times, serif;
        font-weight: bold;
    }
   </style>

    <!-- Atributo Class 
    O atributo class é um dos mais utilizados em HTML. Ele é usado para atribuir uma ou mais classes a um elemento, permitindo que você estilize ou manipule esse elemento usando CSS ou JavaScript.
    
    Exemplo de uso do atributo class:
    -->
    <div class="produto viola">Viola</div>
    <div class="produto violino">Violino</div>
