<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Exemplo de como um id pode ser usado no css -->
   <style>
    #Titulo-principal{
        color: red;
    }
    #Titulo-secundario{
        color: blue;
    }
   </style>

    <!-- Atributo ID -->
     <h1 id="Titulo-principal">Boa noite</h1>
     <h2 id="Titulo-secundario">Boa noite</h2>
</body>
</html>
