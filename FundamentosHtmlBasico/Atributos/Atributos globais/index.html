<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Atributos globais comuns no html
       Atributos globais são atributos comuns que podem ser usados em qualquer elemento Html.
       ALguns deles são:
       - id
       - class
       - data
       - style 
    -->

    <h1 style="color: blue;">Olá, seja bem vindo!</h1>
    <p id="paragrafo1" class="paragrafo" data-info="informação adicional">Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate.</p>

</body>
</html>
