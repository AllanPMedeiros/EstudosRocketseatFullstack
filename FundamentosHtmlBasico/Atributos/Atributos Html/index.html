<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atributos Html</title>
</head>
<body>
    <!--
    Atributos HTML
      Atributos html são configurações extras e informações que podem influenciar o comportamento de uma tag ou fornecer informações adicionais sobre a tag   
     -->

     <img src="asads" alt="qualquer texto">

     <!--
        Sobre as aspas
         É possivel usar um atributo sem aspas, mas isso não é recomendado, pois pode causar problemas de interpretação do código. O ideal é sempre usar aspas para garantir que o valor do atributo seja interpretado corretamente. Também não indicado usar aspas simples, pois elas podem causar problemas de interpretação do código. O ideal é sempre usar aspas duplas para garantir que o valor do atributo seja interpretado corretamente.
      -->
         <a href="https://google.com"> Link </a>
</body>
</html>
