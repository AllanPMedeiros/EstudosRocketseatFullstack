<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Atributos booleanos
     São atributos que não precisam de conteudo para funcionar, basta a presença do atributo para que ele seja ativado. Exemplo: checked, disabled, readonly, etc.
      -->
    <input type="checkbox" checked>
    <input type="text" disabled>
    <input type="text" readonly>

    <h1 hidden>Olá, Seja bem vindo!</h1>
</body>
</html>
